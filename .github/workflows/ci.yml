# =============================================================================
# E-Menum CI - Continuous Integration
# =============================================================================
# Push veya PR (main) -> lint, migration check, tests
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e_menum

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: e_menum/requirements-dev.txt

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: e_menum

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: e_menum/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check --fail-level WARNING
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test

      - name: Migration check (no unapplied migrations)
        run: python manage.py makemigrations --check --dry-run
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test

      - name: Run tests
        run: pytest -x -q --tb=short
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test

  tailwind:
    name: Tailwind Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e_menum

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Build CSS
        run: |
          npm install --no-audit --no-fund
          npm run css:build
