# =============================================================================
# E-Menum CI/CD - Deploy tetikleyici
# =============================================================================
# Push (veya manuel) sonrası sunucuda deploy script'ini tetiklemek için
# webhook kullanır. Sunucuda webhook dinleyen bir servis (Coolify, webhook server)
# bu URL'yi çağırınca scripts/deploy.sh çalıştırılır.
#
# Kurulum:
#   1. GitHub repo → Settings → Secrets and variables → Actions
#   2. DEPLOY_WEBHOOK_URL ekle (örn. https://sunucu/coolify-webhook/xxx veya
#      https://sunucu:9000/hooks/deploy)
#   3. Sunucuda deploy script'ini webhook ile çalıştırın (ör. systemd + tiny server
#      veya Coolify "Build" webhook'u)
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'specs/**'
      - 'file-timelines/**'
  workflow_dispatch:

jobs:
  notify-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
        run: |
          echo "Triggering deploy webhook..."
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"${{ github.ref }}\",\"repository\":\"${{ github.repository }}\",\"sha\":\"${{ github.sha }}\"}" \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}" || echo "Webhook call failed (check DEPLOY_WEBHOOK_URL)"
        continue-on-error: true

      - name: No webhook configured
        if: ${{ secrets.DEPLOY_WEBHOOK_URL == '' }}
        run: |
          echo "DEPLOY_WEBHOOK_URL secret not set. To auto-deploy on push:"
          echo "  1. Add secret DEPLOY_WEBHOOK_URL (your Coolify or webhook URL)"
          echo "  2. On server, run ./scripts/deploy.sh when webhook is received"
          echo "Or run ./scripts/deploy.sh manually on the server after git pull."
