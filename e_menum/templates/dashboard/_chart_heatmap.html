{% load i18n %}
{# Organization Activity Heatmap — 1/2 width #}
<div class="dashboard-card db-col-6"
     data-endpoint="/admin/api/org-activity-heatmap/"
     data-chart-type="heatmap">
    <div class="chart-header">
        <div class="chart-header-left">
            <h3><i class="ph ph-grid-four"></i> {% trans "Organizasyon Aktivite Haritası" %}</h3>

        </div>
    </div>
    <div class="chart-body loading">
        <div class="skeleton skeleton-chart"></div>
    </div>
</div>
