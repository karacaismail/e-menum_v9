{% load i18n %}
<nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4" aria-label="{% trans 'Breadcrumb' %}">
    <ol class="flex flex-wrap items-center gap-2 text-sm text-gray-500 dark:text-gray-400">
        <li>
            <a href="{% url 'website:home' %}" class="hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
                <i class="ph ph-house text-base"></i>
            </a>
        </li>
        {% for crumb in breadcrumbs %}
        <li class="flex items-center gap-2">
            <i class="ph ph-caret-right text-xs text-gray-400"></i>
            {% if crumb.url %}
            <a href="{{ crumb.url }}" class="hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
                {{ crumb.label }}
            </a>
            {% else %}
            <span class="text-gray-900 dark:text-white font-medium">{{ crumb.label }}</span>
            {% endif %}
        </li>
        {% endfor %}
    </ol>
</nav>
