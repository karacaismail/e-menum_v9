[pytest]
# Django settings module for pytest-django
DJANGO_SETTINGS_MODULE = config.settings.development

# Test file discovery patterns
python_files = test_*.py *_test.py tests.py
python_classes = Test* *Tests *Suite
python_functions = test_*

# Test directories
testpaths = tests apps

# Markers registration
markers =
    unit: Unit tests - isolated, no database
    integration: Integration tests - may use database
    e2e: End-to-end tests - full stack
    slow: Slow running tests
    api: API endpoint tests
    model: Model tests

# Coverage configuration
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --reuse-db
    -p no:warnings

# Minimum coverage threshold (enforced in CI)
# Use: pytest --cov=apps --cov-report=term-missing --cov-fail-under=80

# Django database configuration
# pytest-django automatically creates test database
django_find_project = true

# Enable Django debug mode in tests
django_debug_mode = false

# Async mode for async tests
asyncio_mode = auto

# Filter deprecation warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    error::RuntimeWarning

# Output settings
console_output_style = progress

# Cache directory
cache_dir = .pytest_cache

# Parallel execution support (pytest-xdist)
# Use: pytest -n auto
