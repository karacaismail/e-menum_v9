<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- E-Menum Favicon: QR frame with E letter -->
  <rect width="32" height="32" rx="6" fill="#1A6B5A"/>
  <rect x="2" y="2" width="28" height="28" rx="4" fill="white"/>
  <!-- QR corner: top-left -->
  <rect x="4" y="4" width="8" height="8" rx="1.5" fill="#1A6B5A"/>
  <rect x="5.5" y="5.5" width="5" height="5" rx="1" fill="white"/>
  <rect x="7" y="7" width="2" height="2" rx="0.5" fill="#1A6B5A"/>
  <!-- QR corner: top-right -->
  <rect x="20" y="4" width="8" height="8" rx="1.5" fill="#1A6B5A"/>
  <rect x="21.5" y="5.5" width="5" height="5" rx="1" fill="white"/>
  <rect x="23" y="7" width="2" height="2" rx="0.5" fill="#1A6B5A"/>
  <!-- QR corner: bottom-left -->
  <rect x="4" y="20" width="8" height="8" rx="1.5" fill="#1A6B5A"/>
  <rect x="5.5" y="21.5" width="5" height="5" rx="1" fill="white"/>
  <rect x="7" y="23" width="2" height="2" rx="0.5" fill="#1A6B5A"/>
  <!-- Center "E" letter -->
  <text x="16" y="21" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-weight="800" font-size="11" fill="#1A6B5A" text-anchor="middle">E</text>
  <!-- Accent dot bottom-right -->
  <rect x="22" y="22" width="3" height="3" rx="0.5" fill="#F5A623"/>
  <rect x="26" y="22" width="2" height="2" rx="0.5" fill="#F5A623" opacity="0.6"/>
  <rect x="22" y="26" width="2" height="2" rx="0.5" fill="#F5A623" opacity="0.6"/>
</svg>
