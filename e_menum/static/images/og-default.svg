<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- OG Default Image: Brand gradient + Logo + Tagline -->
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1a14"/>
      <stop offset="40%" stop-color="#081017"/>
      <stop offset="100%" stop-color="#0f2b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A6B5A"/>
      <stop offset="100%" stop-color="#2adea9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="white" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(100,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(200,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(400,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,100)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,200)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,300)"/>
  </g>
  <!-- QR Icon (large) -->
  <g transform="translate(460, 160)">
    <rect x="0" y="0" width="80" height="80" rx="12" fill="#1A6B5A"/>
    <rect x="4" y="4" width="72" height="72" rx="8" fill="white" opacity="0.95"/>
    <rect x="10" y="10" width="20" height="20" rx="3" fill="#1A6B5A"/>
    <rect x="13" y="13" width="14" height="14" rx="2" fill="white"/>
    <rect x="16" y="16" width="8" height="8" rx="1" fill="#1A6B5A"/>
    <rect x="50" y="10" width="20" height="20" rx="3" fill="#1A6B5A"/>
    <rect x="53" y="13" width="14" height="14" rx="2" fill="white"/>
    <rect x="56" y="16" width="8" height="8" rx="1" fill="#1A6B5A"/>
    <rect x="10" y="50" width="20" height="20" rx="3" fill="#1A6B5A"/>
    <rect x="13" y="53" width="14" height="14" rx="2" fill="white"/>
    <rect x="16" y="56" width="8" height="8" rx="1" fill="#1A6B5A"/>
    <rect x="56" y="56" width="6" height="6" rx="1" fill="#F5A623"/>
    <rect x="64" y="56" width="4" height="4" rx="0.5" fill="#F5A623" opacity="0.6"/>
    <rect x="56" y="64" width="4" height="4" rx="0.5" fill="#F5A623" opacity="0.6"/>
  </g>
  <!-- Wordmark -->
  <text x="556" y="210" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-weight="800" font-size="56" fill="white" text-anchor="start" letter-spacing="-0.02em">E</text>
  <text x="590" y="210" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-weight="800" font-size="56" fill="#F5A623" text-anchor="start">-</text>
  <text x="614" y="210" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-weight="800" font-size="56" fill="white" text-anchor="start" letter-spacing="-0.02em">Menum</text>
  <!-- Tagline -->
  <text x="600" y="360" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="28" fill="#94a3b8" text-anchor="middle" letter-spacing="0.02em">Akilli menuler, veri odakli kararlar</text>
  <!-- CTA bar -->
  <rect x="420" y="420" width="360" height="56" rx="28" fill="url(#accent)"/>
  <text x="600" y="455" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-weight="700" font-size="20" fill="white" text-anchor="middle">14 Gun Ucretsiz Basla</text>
  <!-- URL -->
  <text x="600" y="560" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="16" fill="#64748b" text-anchor="middle">e-menum.com</text>
</svg>
