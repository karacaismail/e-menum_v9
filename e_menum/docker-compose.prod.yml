# =============================================================================
# E-Menum Docker Compose - Production (AMD64 Linux / Hetzner)
# =============================================================================
# Usage:
#   Build:  docker compose -f docker-compose.prod.yml build
#   Start:  docker compose -f docker-compose.prod.yml up -d
#   Stop:   docker compose -f docker-compose.prod.yml down
#   Logs:   docker compose -f docker-compose.prod.yml logs -f web
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: emenum_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-emenum}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-emenum}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - emenum_network

  # ---------------------------------------------------------------------------
  # Redis (Cache & Celery Broker)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: emenum_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emenum_network

  # ---------------------------------------------------------------------------
  # Django Web Application (Production)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile.amd64linux
      target: production
    container_name: emenum_web
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      SERVER_IP: ${SERVER_IP:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-emenum}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_SSL_REQUIRE: "false"
      # SSL/HTTPS: Let the reverse proxy (Traefik/Nginx) handle redirection.
      # Only set to "true" if Django is directly exposed to the internet.
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-false}
      TZ: ${TZ:-Europe/Istanbul}
      # Entrypoint flags
      DJANGO_MIGRATE: "true"
      DJANGO_COLLECTSTATIC: "true"
      DJANGO_CREATE_SUPERUSER: ${DJANGO_CREATE_SUPERUSER:-false}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@e-menum.net}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin123}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - emenum_network

  # ---------------------------------------------------------------------------
  # Celery Worker (Background Tasks)
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.amd64linux
      target: celery-worker
    container_name: emenum_celery_worker
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-emenum}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_SSL_REQUIRE: "false"
      TZ: ${TZ:-Europe/Istanbul}
    volumes:
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - emenum_network

  # ---------------------------------------------------------------------------
  # Celery Beat (Periodic Tasks Scheduler)
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.amd64linux
      target: celery-beat
    container_name: emenum_celery_beat
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-emenum}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_SSL_REQUIRE: "false"
      TZ: ${TZ:-Europe/Istanbul}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    networks:
      - emenum_network

# =============================================================================
# Networks
# =============================================================================
networks:
  emenum_network:
    driver: bridge
    name: emenum_network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: emenum_postgres_data
  redis_data:
    name: emenum_redis_data
  static_volume:
    name: emenum_static
  media_volume:
    name: emenum_media
