# =============================================================================
# E-Menum — Nginx Wildcard Subdomain → Canonical Domain Redirect
# =============================================================================
#
# GoDaddy DNS:  *.e-menum.net  →  A record → server IP
#               e-menum.net    →  A record → server IP
#
# Bu config tum subdomain'leri (www, api, blog, foo, vb.) e-menum.net'e
# 301 redirect yapar.  Django'nun CanonicalDomainMiddleware'i de ayni isi
# yapar, ama Nginx seviyesinde yapmak daha performansli cunku Django'ya
# hic ulasmadan redirect olur.
#
# Kullanim:
#   1. Bu dosyayi /etc/nginx/sites-available/e-menum-redirect.conf'a kopyala
#   2. ln -s /etc/nginx/sites-available/e-menum-redirect.conf /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#
# Coolify kullaniyorsaniz:
#   Coolify'in otomatik Nginx/Traefik config'i bu isi yapar.
#   Bu dosya sadece manuel Nginx kurulumu icindir.
# =============================================================================

# --- 1. HTTP: Tum trafik HTTPS'e redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name e-menum.net *.e-menum.net;

    # Let's Encrypt ACME challenge (certbot icin)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Diger her sey → HTTPS canonical
    location / {
        return 301 https://e-menum.net$request_uri;
    }
}

# --- 2. HTTPS: Wildcard subdomain → canonical redirect ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.e-menum.net;

    # SSL sertifikalari (Let's Encrypt wildcard veya multi-domain)
    ssl_certificate     /etc/letsencrypt/live/e-menum.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/e-menum.net/privkey.pem;

    # Tum subdomain trafigini canonical domain'e redirect
    return 301 https://e-menum.net$request_uri;
}

# --- 3. HTTPS: Ana domain (canonical) → Django upstream ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name e-menum.net;

    # SSL sertifikalari
    ssl_certificate     /etc/letsencrypt/live/e-menum.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/e-menum.net/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS (tum subdomain'ler dahil)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files (whitenoise da handle eder ama nginx daha hizli)
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Django upstream (Gunicorn)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeout ayarlari (buyuk dosya upload icin)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # Health check (Coolify / monitoring)
    location /health/ {
        proxy_pass http://127.0.0.1:8000/health/;
        proxy_set_header Host $host;
        access_log off;
    }
}
